<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>机械臂规划智能体</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <!-- 顶栏 -->
        <header>
            <div class="logo">
                <span class="icon">🤖</span>
                <span class="title">机械臂动作规划智能体</span>
                <span class="badge">v1.0</span>
            </div>
            <div class="header-actions">
                <button id="clearBtn" title="清空对话">🗑️</button>
            </div>
        </header>

        <!-- 主内容区：对话记录 -->
        <main id="chatContainer">
            <div id="messageList">
                <!-- 动态添加消息 -->
                <div class="message system">
                    <div class="avatar">💡</div>
                    <div class="content">
                        你好！我是机械臂动作规划专家。<br />
                        请描述你的任务（可附带场景图片），我将为你生成详细的动作序列。
                    </div>
                </div>
            </div>
        </main>

        <!-- 底栏：输入区 -->
        <footer>
            <div class="input-area">
                <div class="toolbar">
                    <label for="imageInput" class="file-btn">🖼️ 图片</label>
                    <input type="file" id="imageInput" accept="image/*" style="display:none" />
                    <span id="fileName" class="file-name">未选择文件</span>
                    <div class="param-group">
                        <label>温度 <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.3" /></label>
                        <span id="tempValue">0.3</span>
                    </div>
                </div>
                <div class="input-row">
                    <textarea id="taskInput" rows="2" placeholder="输入任务描述，例如：将红色方块从A点移动到B点..."></textarea>
                    <button id="sendBtn">发送 ➤</button>
                </div>
                <div class="quick-examples">
                    <span>快速示例：</span>
                    <button class="example-btn">抓取并放置方块</button>
                    <button class="example-btn">绘制圆形轨迹</button>
                    <button class="example-btn">堆叠三个物体</button>
                </div>
            </div>
            <div id="statusBar">就绪</div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
