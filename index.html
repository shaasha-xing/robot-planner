<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>机械臂动作规划智能体</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>🤖 机械臂动作自动规划智能体</h1>
            <p class="subtitle">基于 Qwen3.7-Plus 多模态大模型 · 企业级安全托管</p>
        </header>

        <!-- 安全提示横幅 -->
        <div class="info-banner">
            🔒 API Key 已由服务器安全托管，无需手动输入，密钥零暴露风险
        </div>

        <!-- 任务输入区 -->
        <div class="input-section">
            <label for="taskInput">📝 描述机械臂任务</label>
            <textarea 
                id="taskInput" 
                rows="4" 
                placeholder="例如：请规划一个将红色方块从A点（坐标1,2,0）抓取并移动到B点（坐标4,5,2）的动作序列，要求路径平滑..."
            ></textarea>
        </div>

        <!-- 图片上传（多模态能力） -->
        <div class="input-section">
            <label for="imageInput">🖼️ 上传工作场景图（可选）</label>
            <div class="file-upload-wrapper">
                <input type="file" id="imageInput" accept="image/*" />
                <span id="fileName">未选择文件</span>
            </div>
            <div id="imagePreview"></div>
        </div>

        <!-- 生成按钮 -->
        <button id="planBtn">🚀 生成动作规划</button>

        <!-- 状态提示 -->
        <div id="status" class="status"></div>

        <!-- 结果展示 -->
        <div class="result-section">
            <h3>📋 规划结果</h3>
            <div id="result" class="result-box">
                等待任务输入...
            </div>
        </div>

        <!-- 底部快捷键提示 -->
        <div class="footer-tip">
            💡 提示：按 <kbd>Ctrl</kbd> + <kbd>Enter</kbd> 快速生成
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
